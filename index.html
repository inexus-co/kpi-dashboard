<html lang="ja">
<head>
<meta charset="utf-8">

<title>採点くん / まなんでパズル KPIダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
  :root {
    color-scheme: light;
    --bg: #f7f8fa; --card: #ffffff; --border: #e6e8eb; --text: #1a1d21; --muted: #6b7280;
    --accent: #4f46e5; --good: #16a34a; --bad: #dc2626;
    --radius: 14px; --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; padding: 24px 18px 40px; }
  .wrap { max-width: 1100px; margin: 0 auto; }
  header.top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
  h1 { font-size: 21px; margin: 0; letter-spacing: .2px; }
  .sub { color: var(--muted); font-size: 13px; margin-top: 3px; }
  .updated { color: var(--muted); font-size: 12px; }
  .tabs { display: inline-flex; background: #eceef1; border-radius: 10px; padding: 3px; gap: 2px; }
  .tabs button { border: 0; background: transparent; color: var(--muted); font-size: 13px; font-weight: 600; padding: 7px 16px; border-radius: 8px; cursor: pointer; transition: all .12s; font-family: inherit; }
  .tabs button.active { background: #fff; color: var(--accent); box-shadow: var(--shadow); }
  .app-section { margin-top: 26px; }
  .app-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
  .app-head .dot { width: 12px; height: 12px; border-radius: 4px; }
  .app-head h2 { font-size: 17px; margin: 0; }
  .app-head .badge { font-size: 11px; color: var(--muted); }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
  .kpi { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); }
  .kpi .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .kpi .value { font-size: 25px; font-weight: 700; line-height: 1.1; }
  .kpi .unit { font-size: 13px; font-weight: 500; color: var(--muted); margin-left: 2px; }
  .kpi .delta { font-size: 12px; margin-top: 6px; font-weight: 600; }
  .delta.up { color: var(--good); } .delta.down { color: var(--bad); } .delta.flat { color: var(--muted); }
  .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 14px; margin-top: 14px; }
  .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px 10px; box-shadow: var(--shadow); }
  .chart-card h3 { font-size: 14px; margin: 0 0 10px; }
  .chart-box { position: relative; height: 230px; }
  .chart-box.short { height: 205px; }
  .footnote { color: var(--muted); font-size: 11px; margin-top: 22px; line-height: 1.5; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">

    <div style="text-align:right">

        <button data-days="180">6ヶ月</button>
      </div>
      <div class="updated" id="updated"></div>
    </div>
  </header>
  <div id="content"></div>
  <div class="footnote">

function filterByDays(series, days) {
  if (!series.length) return [];
  const last = new Date(series[series.length-1].date + "T00:00:00");

function mkChart(id,cfg){ const el=document.getElementById(id); if(el) CHARTS.push(new Chart(el,cfg)); }

function buildLayout() {
  const S=DATA.saiten, P=DATA.puzzle, content=document.getElementById("content");
  const sLast=S[S.length-1]||{}, sPrev=S[S.length-2]||{};
  const paid=(sLast.pro||0)+(sLast.premium||0), paidPrev=(sPrev.pro||0)+(sPrev.premium||0);
  const likeRate=(sLast.like!=null&&sLast.dislike!=null&&(sLast.like+sLast.dislike)>0)?(sLast.like/(sLast.like+sLast.dislike)*100):null;
  let html="";
  if (S.length) html += `<div class="app-section">
      <div class="app-head"><span class="dot" style="background:${palette.indigo}"></span><h2>採点くん</h2><span class="badge">最新 ${sLast.date?shortDate(sLast.date):"—"}</span></div>
      <div class="kpi-grid">
        ${kpiCard("登録ユーザー",fmt(sLast.registered),"人",deltaHtml(sLast.registered,sPrev.registered,"人"))}
        ${kpiCard("課金 (Pro+Premium)",fmt(paid),"人",deltaHtml(paid,paidPrev,"人"))}
        ${kpiCard("当日採点数",fmt(sLast.dayScore),"回",deltaHtml(sLast.dayScore,sPrev.dayScore,"回"))}
        ${kpiCard("アクティブ",fmt(sLast.active),"人",deltaHtml(sLast.active,sPrev.active,"人"))}
        ${kpiCard("いいね率",likeRate!=null?likeRate.toFixed(1):"—","%",deltaHtml(sLast.like,sPrev.like,"件"))}
      </div>
      <div class="charts">
        <div class="chart-card"><h3>登録ユーザー数の推移</h3><div class="chart-box"><canvas id="s-users"></canvas></div></div>
        <div class="chart-card"><h3>課金プラン内訳（最新）</h3><div class="chart-box short"><canvas id="s-plan"></canvas></div></div>
        <div class="chart-card"><h3>課金ユーザーの推移（Pro / Premium）</h3><div class="chart-box"><canvas id="s-paid"></canvas></div></div>
        <div class="chart-card"><h3>アクティビティ（当日採点数・アクティブ数）</h3><div class="chart-box"><canvas id="s-activity"></canvas></div></div>
        <div class="chart-card"><h3>評価の推移（いいね率）</h3><div class="chart-box"><canvas id="s-likerate"></canvas></div></div>
        <div class="chart-card"><h3>累計評価（最新）</h3><div class="chart-box short"><canvas id="s-rating"></canvas></div></div>
      </div></div>`;
  const pLast=P[P.length-1]||{}, pPrev=P[P.length-2]||{};
  if (P.length) html += `<div class="app-section">
      <div class="app-head"><span class="dot" style="background:${palette.sky}"></span><h2>まなんでパズル</h2><span class="badge">最新 ${pLast.date?shortDate(pLast.date):"—"}</span></div>
      <div class="kpi-grid">
        ${kpiCard("総ユーザー",fmt(pLast.totalUsers),"人",deltaHtml(pLast.totalUsers,pPrev.totalUsers,"人"))}
        ${kpiCard("総アカウント",fmt(pLast.totalAccounts),"件",deltaHtml(pLast.totalAccounts,pPrev.totalAccounts,"件"))}
        ${kpiCard("当日新規ユーザー",fmt(pLast.newUsers),"人",deltaHtml(pLast.newUsers,pPrev.newUsers,"人"))}
      </div>
      <div class="charts">
        <div class="chart-card"><h3>総ユーザー数の推移</h3><div class="chart-box"><canvas id="p-users"></canvas></div></div>
        <div class="chart-card"><h3>総アカウント数の推移</h3><div class="chart-box"><canvas id="p-accounts"></canvas></div></div>
        <div class="chart-card"><h3>当日新規ユーザー数</h3><div class="chart-box"><canvas id="p-new"></canvas></div></div>
      </div></div>`;
  content.innerHTML = html;
}

function drawCharts(days) {
  CHARTS.forEach(c=>c.destroy()); CHARTS=[];
  const S=filterByDays(DATA.saiten,days), P=filterByDays(DATA.puzzle,days);
  const sL=S.map(d=>shortDate(d.date)), pL=P.map(d=>shortDate(d.date));
  if (S.length) {
    const last=DATA.saiten[DATA.saiten.length-1];
    mkChart("s-users", lineCfg(sL,[{label:"登録ユーザー",data:S.map(d=>d.registered),borderColor:palette.indigo,backgroundColor:"rgba(79,70,229,.08)",fill:true}]));
    mkChart("s-plan",{type:"doughnut",data:{labels:["Free","Pro","Premium"],datasets:[{data:[last.free,last.pro,last.premium],backgroundColor:[palette.slate,palette.indigo,palette.violet],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:"62%",plugins:{legend:{position:"bottom",labels:{boxWidth:12,font:{size:11}}}}}});
    mkChart("s-paid", lineCfg(sL,[{label:"Pro",data:S.map(d=>d.pro),borderColor:palette.indigo},{label:"Premium",data:S.map(d=>d.premium),borderColor:palette.violet}]));
    mkChart("s-activity",{type:"bar",data:{labels:sL,datasets:[
      {type:"bar",label:"当日採点数",data:S.map(d=>d.dayScore),backgroundColor:"rgba(14,165,233,.45)",borderRadius:3,yAxisID:"y"},
      {type:"line",label:"アクティブ数",data:S.map(d=>d.active),borderColor:palette.indigo,borderWidth:2,tension:.3,pointRadius:0,yAxisID:"y1"}]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{labels:{boxWidth:12,font:{size:11}}}},
      scales:{x:{ticks:{maxTicksLimit:7,font:{size:10}},grid:{display:false}},y:{position:"left",ticks:{font:{size:10}},grid:{color:"#f1f3f5"}},y1:{position:"right",ticks:{font:{size:10}},grid:{display:false}}}}});
    const rates=S.map(d=>(d.like!=null&&d.dislike!=null&&(d.like+d.dislike)>0)?+(d.like/(d.like+d.dislike)*100).toFixed(1):null);
    mkChart("s-likerate", lineCfg(sL,[{label:"いいね率(%)",data:rates,borderColor:palette.green,backgroundColor:"rgba(22,163,74,.08)",fill:true,spanGaps:true}],
      {scales:{x:{ticks:{maxTicksLimit:7,font:{size:10}},grid:{display:false}},y:{ticks:{font:{size:10},callback:v=>v+"%"},grid:{color:"#f1f3f5"},suggestedMin:0,suggestedMax:100}}}));
    mkChart("s-rating",{type:"doughnut",data:{labels:["いいね","よくないね"],datasets:[{data:[last.like,last.dislike],backgroundColor:[palette.green,palette.red],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:"62%",plugins:{legend:{position:"bottom",labels:{boxWidth:12,font:{size:11}}}}}});
  }
  if (P.length) {
    mkChart("p-users", lineCfg(pL,[{label:"総ユーザー",data:P.map(d=>d.totalUsers),borderColor:palette.sky,backgroundColor:"rgba(14,165,233,.08)",fill:true}]));
    mkChart("p-accounts", lineCfg(pL,[{label:"総アカウント",data:P.map(d=>d.totalAccounts),borderColor:palette.amber,backgroundColor:"rgba(217,119,6,.08)",fill:true}]));
    mkChart("p-new",{type:"bar",data:{labels:pL,datasets:[{label:"当日新規ユーザー",data:P.map(d=>d.newUsers),backgroundColor:"rgba(14,165,233,.55)",borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:7,font:{size:10}},grid:{display:false}},y:{ticks:{font:{size:10}},grid:{color:"#f1f3f5"},beginAtZero:true}}}});
  }
}

function wireTabs() {
  const tabs=document.getElementById("tabs");
  tabs.addEventListener("click", e => {
    const btn=e.target.closest("button"); if(!btn) return;
    [...tabs.children].forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    drawCharts(parseInt(btn.dataset.days,10));
  });
}

buildLayout();
wireTabs();
drawCharts(30);
document.getElementById("updated").textContent = "データ基準日: " + (DATA.generatedAt || (DATA.saiten.slice(-1)[0]||{}).date || "");
</script>
</body>
</html>
