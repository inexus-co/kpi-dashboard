<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>KPIダッシュボード（要パスワード）</title>
<style>
  :root{color-scheme:light;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Segoe UI",sans-serif}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f5f7;color:#1a1d21}
  .card{background:#fff;border:1px solid #e6e8eb;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.06);padding:30px 28px;width:340px;max-width:90vw}
  h1{font-size:17px;margin:0 0 4px}
  p.sub{font-size:13px;color:#6b7280;margin:0 0 18px}
  label{font-size:12px;color:#6b7280;display:block;margin-bottom:6px}
  input{width:100%;padding:11px 12px;font-size:15px;border:1px solid #d1d5db;border-radius:9px;outline:none}
  input:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.12)}
  button{width:100%;margin-top:14px;padding:11px;font-size:14px;font-weight:600;color:#fff;background:#4f46e5;border:0;border-radius:9px;cursor:pointer}
  button:disabled{opacity:.6;cursor:default}
  .err{color:#dc2626;font-size:12.5px;margin-top:10px;min-height:16px}
</style>
</head>
<body>
<div class="card">
  <h1>採点くん / まなんでパズル KPI</h1>
  <p class="sub">閲覧にはパスワードが必要です</p>
  <form id="f">
    <label for="pw">パスワード</label>
    <input id="pw" type="password" autocomplete="current-password" autofocus>
    <button id="btn" type="submit">表示する</button>
    <div class="err" id="err"></div>
  </form>
</div>

async function unlock(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b2u(SALT),iterations:ITERS,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2u(IV)},key,b2u(PAYLOAD));
  return new TextDecoder().decode(plain);
}
document.getElementById("f").addEventListener("submit",async e=>{
  e.preventDefault();
  const btn=document.getElementById("btn"),err=document.getElementById("err");
  err.textContent="";btn.disabled=true;btn.textContent="復号中…";
  try{
    const html=await unlock(document.getElementById("pw").value);
    document.open();document.write(html);document.close();
  }catch(ex){
    err.textContent="パスワードが違います。";
    btn.disabled=false;btn.textContent="表示する";
  }
});
